<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 4 - Assignments</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Day 4 - JavaScript Assignments</h1>

    <!-- Assignment 1 -->
    <div class="container">

        <h2> Multiplication Table</h2>

        <input type="number" id="tableNumber" placeholder="Enter a Number">

        <button onclick="multiplicationTable()">
            Print Table
        </button>

        <pre id="result1"></pre>

    </div>

    <!-- Assignment 2 -->
    <div class="container">

        <h2> Prime Number</h2>

        <input type="number" id="primeNumber" placeholder="Enter a Number">

        <button onclick="checkPrime()">
            Check Prime
        </button>

        <p id="result2"></p>

    </div>

    <!-- Assignment 3 -->
    <div class="container">

        <h2>Sum of Numbers (1 - 100)</h2>

        <button onclick="calculateSum()">
            Calculate Sum
        </button>

        <p id="result3"></p>

    </div>

    <!-- Assignment 4 -->
    <div class="container">

        <h2> Number Guessing Game</h2>

        <button onclick="guessGame()">
            Start Game
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
